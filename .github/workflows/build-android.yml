name: Build Android Example APK

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: 'SDK version to use (npm @bluebillywig/react-native-bb-player)'
        required: true
        type: string
        default: '8.45.10'

jobs:
  build-android:
    name: Build Android Example App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install SDK from npm and example dependencies
        working-directory: example
        run: |
          SDK_VERSION="${{ inputs.sdk_version }}"
          echo "::notice::Using SDK version: ${SDK_VERSION}"

          # Replace local file dependency with published npm version
          node -e "
            const pkg = require('./package.json');
            pkg.dependencies['@bluebillywig/react-native-bb-player'] = '${SDK_VERSION}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          cat package.json | grep bb-player
          npm install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Android Release APK
        working-directory: example/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BBPlayerExample-${{ inputs.sdk_version }}-android
          path: example/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Add download info to summary
        run: |
          echo "## Android APK Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**SDK Version:** ${{ inputs.sdk_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Build:** #${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the APK from the **Artifacts** section above." >> "$GITHUB_STEP_SUMMARY"
