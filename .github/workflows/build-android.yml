name: Build Android Example APK

on:
  pull_request:
    branches: [master]
    paths:
      - 'android/**'
      - 'src/**'
      - 'example/**'
      - 'package.json'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android Example App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Install example dependencies
        working-directory: example
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Android Release APK
        working-directory: example/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BBPlayerExample-${{ steps.version.outputs.version }}-${{ steps.version.outputs.date }}-android
          path: example/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Add download info to summary
        run: |
          echo "## Android APK Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Build:** #${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date:** ${{ steps.version.outputs.date }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the APK from the **Artifacts** section above." >> "$GITHUB_STEP_SUMMARY"
